<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenHarvest Organics</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{
background:#f4f8f2;
}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#1b5e20;
color:white;
flex-wrap:wrap;
}

nav input{
padding:6px;
border:none;
border-radius:4px;
}

.cart-count{
background:red;
padding:4px 8px;
border-radius:50%;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.product{
background:white;
width:280px;
margin:15px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

.product h3{
margin:10px 0;
}

.product p{
color:#2e7d32;
font-weight:bold;
}

button{
background:#2e7d32;
color:white;
padding:8px 12px;
border:none;
cursor:pointer;
border-radius:5px;
margin-top:8px;
}

button:hover{
background:#1b5e20;
}

.cart{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

footer{
background:#1b5e20;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}

@media(max-width:768px){
.container{
flex-direction:column;
align-items:center;
}

.product{
width:90%;
}

nav{
flex-direction:column;
gap:10px;
}
}

</style>
</head>

<body>

<header>
<h1>GreenHarvest Organics 🌿</h1>
<p>Pure. Natural. Sustainable.</p>
</header>

<nav>
<div>
Search: <input type="text" id="search" placeholder="Search products..." onkeyup="searchProduct()">
</div>
<div>
Cart 🛒 <span class="cart-count" id="cart-count">0</span>
</div>
</nav>
<div style="text-align:center; margin:20px;">
    <select onchange="filterCategory(this.value)">
        <option value="all">All Categories</option>
        <option value="fruit">Fruits</option>
        <option value="vegetable">Vegetables</option>
        <option value="grocery">Groceries</option>
    </select>

    <select onchange="sortProducts(this.value)">
        <option value="default">Sort By</option>
        <option value="low">Price: Low to High</option>
        <option value="high">Price: High to Low</option>
    </select>
</div>

<div class="container" id="product-list">

<div class="product" data-name="Organic Apples" data-category="fruit" data-price="180">
<img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
<h3>Organic Apples</h3>
<p>₹180 / kg</p>
<button onclick="addToCart('Organic Apples',180)">Add to Cart</button>
</div>

<div class="product" data-name="Fresh Carrots" data-category="vegetable" data-price="90">
<img src="https://images.unsplash.com/photo-1447175008436-054170c2e979?auto=format&fit=crop&w=800&q=80">
<h3>Fresh Carrots</h3>
<p>₹90 / kg</p>
<button onclick="addToCart('Fresh Carrots',90)">Add to Cart</button>
</div>

<div class="product" data-name="Organic Turmeric" data-category="grocery" data-price="250">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Curcuma_longa_roots.jpg/1920px-Curcuma_longa_roots.jpg">
<h3>Organic Turmeric</h3>
<p>₹250</p>
<button onclick="addToCart('Organic Turmeric',250)">Add to Cart</button>
</div>

<div class="product" data-name="Cold Pressed Honey" data-category="grocery" data-price="320">
<img src="https://images.unsplash.com/photo-1587049352851-8d4e89133924">
<h3>Cold Pressed Honey</h3>
<p>₹320</p>
<button onclick="addToCart('Cold Pressed Honey',320)">Add to Cart</button>
</div>

</div>

<div class="cart">
<h2>Your Cart</h2>
<ul id="cart-items"></ul>
<h3>Total: ₹<span id="total">0</span></h3>
<br>
<button onclick="window.location.href='checkout.html'">
Proceed to Checkout
</button>
</div>

<footer>
<p>© 2026 GreenHarvest Organics | All Rights Reserved</p>
</footer>

<script>

let cart=[];
let total=0;

// LOAD FROM LOCAL STORAGE
let savedCart=localStorage.getItem("cart");
let savedTotal=localStorage.getItem("total");

if(savedCart){
cart=JSON.parse(savedCart);
total=parseInt(savedTotal);
updateCartUI();
}

// ADD TO CART
function addToCart(name,price){
cart.push({name,price});
total+=price;

localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("total",total);

updateCartUI();
}

// DISPLAY CART
function displayCart(){
let cartItems=document.getElementById("cart-items");
cartItems.innerHTML="";

cart.forEach((item,index)=>{
cartItems.innerHTML+=`
<li>${item.name} - ₹${item.price}
<button onclick="removeItem(${index})">Remove</button>
</li>
`;
});
}

// REMOVE ITEM
function removeItem(index){
total-=cart[index].price;
cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));
localStorage.setItem("total",total);

updateCartUI();
}

// UPDATE CART UI
function updateCartUI(){
document.getElementById("cart-count").innerText=cart.length;
document.getElementById("total").innerText=total;
displayCart();
}

// SEARCH FUNCTION
function searchProduct(){
let input=document.getElementById("search").value.toLowerCase();
let products=document.querySelectorAll(".product");

products.forEach(product=>{
let name=product.getAttribute("data-name").toLowerCase();
if(name.includes(input)){
product.style.display="block";
}else{
product.style.display="none";
}
});
}

// FILTER CATEGORY
function filterCategory(category){
let products=document.querySelectorAll(".product");

products.forEach(product=>{
if(category==="all"){
product.style.display="block";
}else{
if(product.getAttribute("data-category")===category){
product.style.display="block";
}else{
product.style.display="none";
}
}
});
}

// SORT PRODUCTS
function sortProducts(order){
let container=document.getElementById("product-list");
let products=Array.from(document.querySelectorAll(".product"));

products.sort((a,b)=>{
let priceA=parseInt(a.getAttribute("data-price"));
let priceB=parseInt(b.getAttribute("data-price"));

if(order==="low") return priceA-priceB;
if(order==="high") return priceB-priceA;
return 0;
});

container.innerHTML="";
products.forEach(product=>container.appendChild(product));
}

</script>

</body>
</html>
