<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - GreenHarvest Organics</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f8f2;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:600px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2e7d32;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
margin-top:10px;
}

button:hover{
background:#1b5e20;
}

.step{
display:none;
}

.active{
display:block;
}

</style>
</head>

<body>

<header>
<h1>GreenHarvest Organics 🌿</h1>
<p>Secure Checkout</p>
</header>

<div class="container">

<!-- STEP 1 -->
<div class="step active" id="step1">
<h2>Step 1: Shipping Details</h2>
<input type="text" placeholder="Full Name" required>
<input type="text" placeholder="Address" required>
<input type="text" placeholder="City" required>
<input type="text" placeholder="Pincode" required>
<button onclick="nextStep(2)">Continue</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h2>Step 2: Payment Method</h2>
<select>
<option>Credit/Debit Card</option>
<option>UPI</option>
<option>Cash on Delivery</option>
</select>
<input type="text" placeholder="Card Number">
<input type="text" placeholder="Expiry Date">
<input type="text" placeholder="CVV">
<button onclick="nextStep(3)">Continue</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h2>Step 3: Confirm Order</h2>
<p>Your order is ready to be placed.</p>
<button onclick="placeOrder()">Place Order</button>
</div>

</div>

<script>

function nextStep(step){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+step).classList.add("active");
}

function placeOrder(){
alert("Payment Successful ✅\nThank you for shopping with GreenHarvest!");
localStorage.removeItem("cart");
localStorage.removeItem("total");
window.location.href="index.html";
}

</script>

</body>
</html>
